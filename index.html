<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B0B">
  <title>Staff AJapp — Curso de Protocolo</title>
  <meta name="description" content="App del staff de Alfil Juvenil para el control de asistencia del Curso de Protocolo.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header id="topbar" class="hidden">
    <div class="topbar-inner">
      <span class="brand">♗ <strong>Staff AJapp</strong></span>
      <span id="net-status" class="pill pill-ok" title="Estado de conexión">● en línea</span>
      <span id="queue-badge" class="pill pill-warn hidden" title="Check-ins pendientes de sincronizar">⇅ 0</span>
    </div>
  </header>

  <main id="view"></main>

  <!-- Tab bar: 2 pantallas (D14) — Escanear · Estadísticas -->
  <nav id="tabbar" class="hidden">
    <button data-route="escanear">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8V5a2 2 0 0 1 2-2h3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/><rect x="7.5" y="7.5" width="3.4" height="3.4" rx="0.6"/><rect x="13.1" y="7.5" width="3.4" height="3.4" rx="0.6"/><rect x="7.5" y="13.1" width="3.4" height="3.4" rx="0.6"/><path d="M13.5 13.5h1.4M15.8 15.8h.7"/></svg>
      Escanear
    </button>
    <button data-route="estadisticas">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M5 20V14M12 20V8M19 20V4"/></svg>
      Estadísticas
    </button>
  </nav>

  <div id="toast"></div>

  <!-- Lector QR de respaldo (BarcodeDetector nativo cubre la mayoría de Android/Chrome) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js" defer></script>

  <script src="js/store.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
