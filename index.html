<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B0B">
  <title>Staff AJapp — Curso de Protocolo</title>
  <meta name="description" content="App del staff de Alfil Juvenil para el control de asistencia del Curso de Protocolo.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header id="topbar" class="hidden">
    <div class="topbar-inner">
      <span class="brand">♗ <strong>Staff AJapp</strong></span>
      <span id="net-status" class="pill pill-ok" title="Estado de conexión">● en línea</span>
      <span id="queue-badge" class="pill pill-warn hidden" title="Check-ins pendientes de sincronizar">⇅ 0</span>
      <span id="user-chip" class="user-chip"></span>
    </div>
  </header>

  <main id="view"></main>

  <!-- Tab bar: réplica de MainTabView.swift (Sesiones · Escanear · Dashboard) -->
  <nav id="tabbar" class="hidden">
    <button data-route="sesiones">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><circle cx="4.5" cy="6" r="1" fill="currentColor"/><circle cx="4.5" cy="12" r="1" fill="currentColor"/><circle cx="4.5" cy="18" r="1" fill="currentColor"/><path d="M9 6h11M9 12h11M9 18h11"/></svg>
      Sesiones
    </button>
    <button data-route="escanear">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8V5a2 2 0 0 1 2-2h3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/><rect x="7.5" y="7.5" width="3.4" height="3.4" rx="0.6"/><rect x="13.1" y="7.5" width="3.4" height="3.4" rx="0.6"/><rect x="7.5" y="13.1" width="3.4" height="3.4" rx="0.6"/><path d="M13.5 13.5h1.4M15.8 15.8h.7"/></svg>
      Escanear
    </button>
    <button data-route="dashboard">
      <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M5 20V14M12 20V8M19 20V4"/></svg>
      Dashboard
    </button>
    <button data-route="admin" id="tab-admin" class="hidden">
      <svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.12-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.4a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1.03-1.56V2a2 2 0 1 1 4 0v.09c0 .68.4 1.3 1.03 1.56a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09c.26.63.88 1.03 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.03z"/></svg>
      Admin
    </button>
  </nav>

  <div id="toast"></div>

  <!-- Librerías externas (solo demo): lector QR de respaldo, parser Excel y generación de QRs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

  <script src="js/demo-data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
